<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Idea Board</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px;
    }
    .board {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 450px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
    }
    button:hover {
      transform: scale(1.03);
      background: linear-gradient(135deg, #0056b3, #004080);
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 25px;
    }
    li {
      background: #f9fafc;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .idea-text {
      font-size: 15px;
      color: #222;
    }
    .idea-author {
      font-size: 13px;
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="board">
    <h2>💡 Group Idea Board</h2>
    <select id="nameSelect">
      <option value="">Select your name...</option>
      <option value="Nimal">Nimal</option>
      <option value="Sara">Sara</option>
      <option value="Alex">Alex</option>
    </select>
    <input type="text" id="ideaInput" placeholder="Enter your idea here..." />
    <button onclick="addIdea()">+ Add Idea</button>
    
    <ul id="ideaList">
      <li>
        <span class="idea-text">Build a study planner</span>
        <span class="idea-author">– Nimal</span>
      </li>
      <li>
        <span class="idea-text">Start a podcast</span>
        <span class="idea-author">– Sara</span>
      </li>
      <li>
        <span class="idea-text">Organize a coding workshop</span>
        <span class="idea-author">– Alex</span>
      </li>
    </ul>
  </div>

  <script>
    function addIdea() {
      const name = document.getElementById('nameSelect').value;
      const idea = document.getElementById('ideaInput').value.trim();
      if (!name || !idea) {
        alert("Please select your name and enter an idea.");
        return;
      }
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="idea-text">${idea}</span>
        <span class="idea-author">– ${name}</span>
      `;
      document.getElementById('ideaList').appendChild(li);
      document.getElementById('ideaInput').value = "";
    }
  </script>
</body>
</html>
