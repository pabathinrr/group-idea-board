<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Idea Board</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px;
      margin: 0;
    }
    .board {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 450px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box; /* Ensures padding doesn't break width */
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      margin-top: 5px;
    }
    button:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #0056b3, #004080);
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 25px;
    }
    li {
      background: #f9fafc;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .idea-text {
      font-size: 15px;
      color: #222;
      font-weight: 500;
    }
    .idea-author {
      font-size: 13px;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="board">
    <h2>💡 Group Idea Board</h2>
    
    <select id="nameSelect">
      <option value="">Select your name...</option>
      <option value="Nimal">Nimal</option>
      <option value="Sara">Sara</option>
      <option value="Alex">Alex</option>
      <option value="Arosha">Arosha</option>
    </select>

    <input type="text" id="ideaInput" placeholder="Enter your idea here..." />
    <button onclick="addIdea()">+ Add Idea</button>
    
    <ul id="ideaList">
      <li>
        <span class="idea-text">Build a study planner</span>
        <span class="idea-author">– Nimal</span>
      </li>
      <li>
        <span class="idea-text">Start a podcast</span>
        <span class="idea-author">– Sara</span>
      </li>
      <li>
        <span class="idea-text">Organize a coding workshop</span>
        <span class="idea-author">– Alex</span>
      </li>
      <li>
        <span class="idea-text">Create a home garden</span>
        <span class="idea-author">– Arosha</span>
      </li>
    </ul>
  </div>

  <script>
    function addIdea() {
      const nameSelect = document.getElementById('nameSelect');
      const ideaInput = document.getElementById('ideaInput');
      const ideaList = document.getElementById('ideaList');

      const name = nameSelect.value;
      const idea = ideaInput.value.trim();

      if (!name || !idea) {
        alert("Please select your name and enter an idea.");
        return;
      }

      // Create list item
      const li = document.createElement('li');

      // Create text span (Securely using textContent)
      const spanText = document.createElement('span');
      spanText.className = 'idea-text';
      spanText.textContent = idea;

      // Create author span
      const spanAuthor = document.createElement('span');
      spanAuthor.className = 'idea-author';
      spanAuthor.textContent = `– ${name}`;

      // Assemble and add to list
      li.appendChild(spanText);
      li.appendChild(spanAuthor);
      ideaList.appendChild(li);

      // Reset input field
      ideaInput.value = "";
      ideaInput.focus();
    }

    // Allow "Enter" key to trigger the button
    document.getElementById('ideaInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        addIdea();
      }
    });
  </script>

</body>
</html>
