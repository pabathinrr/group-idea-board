<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Idea Board</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px;
      margin: 0;
    }
    .board {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 450px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box; /* Ensures padding doesn't break width */
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      margin-top: 5px;
    }
    button:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #0056b3, #004080);
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 25px;
    }
    li {
      background: #f9fafc;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .idea-text {
      font-size: 15px;
      color: #222;
      font-weight: 500;
    }
    .idea-author {
      font-size: 13px;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="board">
    <h2>💡 Group Idea Board</h2>
    
    <select id="nameSelect">
      <option value="">Select your name...</option>
      <option value="Nimal">Nimal</option>
      <option value="Sara">Sara</option>
      <option value="Alex">Alex</option>
      <option value="Arosha">Arosha</option>
    </select>

    <input type="text"
