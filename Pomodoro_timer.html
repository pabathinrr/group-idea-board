<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Timer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
      body { min-height: 100vh; display: flex; flex-direction: column; background: #f4f5f7; transition: background 0.3s; }
      body.dark-mode { background: #121212; }
      .navbar { display: flex; justify-content: space-between; align-items: center; background: #800000; padding: 15px 40px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); transition: background 0.3s; }
      .navbar.dark-mode { background: #4a0000; }
      .navbar-brand { display: flex; align-items: center; gap: 15px; }
      .logo-placeholder { width: 45px; height: 45px; background: #FFD700; color: #800000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; box-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
      .navbar h2 { color: white; font-size: 20px; }
      .nav-links { display: flex; gap: 20px; align-items: center; }
      .nav-links a { text-decoration: none; color: #800000; background: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: 0.3s; }
      .nav-links a:hover { background: #FFD700; color: #800000; }
      .navbar.dark-mode .nav-links a { color: #e0e0e0; background: #333; }
      .navbar.dark-mode .nav-links a:hover { background: #FFD700; color: #800000; }
      .toggle-checkbox { display: none; }
      .toggle-label { display: flex; align-items: center; cursor: pointer; background: white; border-radius: 20px; padding: 4px 6px; transition: 0.3s; width: 50px; height: 28px; position: relative; }
      .toggle-label::after { content: '☀️'; position: absolute; left: 6px; font-size: 16px; transition: 0.3s; }
      .toggle-checkbox:checked + .toggle-label { background: #333; }
      .toggle-checkbox:checked + .toggle-label::after { content: '🌙'; left: 24px; }
      .layout-container { display: flex; flex: 1; padding: 30px; gap: 30px; max-width: 1200px; margin: 0 auto; width: 100%; align-items: flex-start; }
      .sidebar, .main-content { animation: sectionFadeIn 0.8s ease-out forwards; opacity: 0; }
      @keyframes sectionFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .sidebar { background: white; width: 250px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); transition: background 0.3s, color 0.3s; border-top: 4px solid #FFD700; }
      .dark-mode .sidebar { background: #2a2a2a; color: #e0e0e0; border-top: 4px solid #800000; }
      .sidebar h3 { color: #800000; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #FFD700; padding-bottom: 8px; transition: color 0.3s; }
      .dark-mode .sidebar h3 { color: #FFD700; }
      .event-item { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 13px; border-left: 4px solid #800000; transition: transform 0.3s, box-shadow 0.3s, background 0.3s, color 0.3s; }
      .dark-mode .event-item { background: #3a3a3a; border-left: 4px solid #FFD700; color: #e0e0e0; }
      .event-item:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(255, 215, 0, 0.7); cursor: pointer; }
      .event-date { font-weight: bold; color: #800000; display: block; margin-bottom: 3px; }
      .dark-mode .event-date { color: #FFD700; }
      .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; animation-delay: 0.2s; }
      .header { text-align: center; color: #333; margin-bottom: 20px; }
      .dark-mode .header { color: #e0e0e0; }
      .header h1 { font-size: 36px; color: #800000; }
      .dark-mode .header h1 { color: #FFD700; }
      .board { background: white; width: 100%; max-width: 480px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); transition: background 0.3s, color 0.3s; }
      .dark-mode .board { background: #2a2a2a; color: #e0e0e0; }
      
      button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 6px; transition: 0.3s; }
      .add-btn { background: #800000; color: white; }
      .add-btn:hover { background: #FFD700; color: #800000; transform: scale(1.03); }
      .clear-btn { background: white; border: 2px solid #800000; color: #800000; }
      .clear-btn:hover { background: #f0f0f0; }
      .dark-mode .clear-btn { border-color:#FFD700; color:#FFD700; background: transparent;}

      /* Specific to Timer */
      .timer-display { font-size: 72px; text-align: center; margin: 20px 0; color: #800000; font-weight: bold; font-family: monospace;}
      .dark-mode .timer-display { color: #FFD700; }
      .timer-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo-placeholder">UCSC</div>
            <h2>Student Dashboard</h2>
        </div>
        <div class="nav-links">
            <a href="Day4.html">Idea Board</a>
            <a href="gpacal.html">GPA Calculator</a>
            <a href="Pomodoro_timer.html">Study Timer</a>
            <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
            <label for="darkModeToggle" class="toggle-label"></label>
        </div>
    </nav>

    <div class="layout-container">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div class="event-item"><span class="event-date">Oct 15, 2026</span>Hackathon Registration Closes</div>
            <div class="event-item"><span class="event-date">Oct 20, 2026</span>Midterm Group Project Due</div>
        </aside>

        <main class="main-content">
            <div class="header"><h1>⏱️ Pomodoro Timer</h1></div>
            <div class="board">
                <div class="timer-display" id="display">25:00</div>
                <div class="timer-btns">
                    <button class="add-btn" onclick="startTimer()">Start</button>
                    <button class="clear-btn" onclick="resetTimer()">Reset</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        const navbar = document.querySelector('.navbar');

        if (localStorage.getItem('darkMode') === 'enabled') {
            darkModeToggle.checked = true;
            body.classList.add('dark-mode');
            navbar.classList.add('dark-mode');
        }

        darkModeToggle.addEventListener('change', function() {
            if (this.checked) {
                body.classList.add('dark-mode');
                navbar.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
            } else {
                body.classList.remove('dark-mode');
                navbar.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
            }
        });

        let timeLeft = 25 * 60;
        let timerInterval;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's up! Take a break. 🔔");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 25 * 60;
            updateDisplay();
        }
    </script>
</body>
</html>
